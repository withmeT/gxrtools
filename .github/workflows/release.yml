name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bin: gxtools.exe
            asset: gxtools-windows-x64.exe
          - os: ubuntu-latest
            bin: gxtools
            asset: gxtools-linux-x64
          - os: macos-latest
            bin: gxtools
            asset: gxtools-macos-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build (release)
        run: cargo build --release --locked

      - name: Prepare asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
          generate_release_notes: true

  prune-old-releases:
    name: Prune old releases
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      # Keep only the latest release (and optionally delete old tags) so GitHub doesn't store old versions.
      - name: Delete older releases (keep latest 1)
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 1
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

